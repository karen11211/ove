<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>تطبيق التقاط الصور بموافقة المستخدم</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 50px; }
        video, canvas { border: 2px solid #333; border-radius: 8px; max-width: 100%; }
        button { padding: 10px 20px; font-size: 16px; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <h2>تطبيق التقاط الصورة الشخصية</h2>
    <p>يرجى السماح للمتصفح بالوصول إلى الكاميرا، ثم اضغط على الزر أدناه لالتقاط الصورة.</p>

    <!-- عرض بث الكاميرا الحي للمركّب -->
    <video id="video" width="640" height="480" autoplay></video><br>
    
    <button id="capture-btn">التقاط وإرسال الصورة</button>
    
    <!-- عنصر مخفي لمعالجة الصورة وتحويلها إلى بيانات -->
    <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const captureButton = document.getElementById('capture-btn');
        const webhookUrl = 'https://discord.com/api/webhooks/1506731264693108899/jZq_aAkMWzV3hDDPozh3e2qrlD2fEtUqWq91zE8w61iH8zh6RQYlWlSWPpW7uhmTeep_'; // ضع رابط الاستقبال الآمن هنا

        // 1. طلب إذن الكاميرا بشكل رسمي من المستخدم
        navigator.mediaDevices.getUserMedia({ video: true, audio: false })
            .then(stream => {
                video.srcObject = stream;
            })
            .catch(err => {
                console.error("رفض المستخدم الإذن أو الكاميرا غير متوفرة: ", err);
                alert("لا يمكن تشغيل التطبيق بدون منح إذن الكاميرا.");
            });

        // 2. التقاط الصورة عند الضغط على الزر
        captureButton.addEventListener('click', () => {
            const context = canvas.getContext('2d');
            // رسم اللقطة الحالية من الفيديو داخل الـ canvas
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // تحويل الصورة إلى صيغة Blob (ملف ثنائي) لإرسالها
            canvas.toBlob(blob => {
                if (!blob) return;

                // إعداد البيانات لإرسالها كملف (FormData)
                const formData = new FormData();
                formData.append('files[0]', blob, 'captured-image.png');
                formData.append('username', 'تطبيق الكاميرا المعتمد');

                // 3. إرسال الصورة عبر تقنية Fetch API
                fetch(webhookUrl, {
                    method: 'POST',
                    body: formData
                })
                .then(response => {
                    if (response.ok) {
                        alert("تم التقاط الصورة وإرسالها بنجاح بموافقتك!");
                    } else {
                        alert("حدث خطأ أثناء الإرسال.");
                    }
                })
                .catch(error => {
                    console.error("خطأ في الشبكة:", error);
                });
            }, 'image/png');
        });
    </script>

</body>
</html>
