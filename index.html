<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>تطبيق التقاط الصور الشخصية</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 50px; background-color: #f4f4f9; }
        .container { max-width: 500px; margin: 0 auto; padding: 20px; background: white; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        video, canvas { border: 2px solid #ddd; border-radius: 8px; max-width: 100%; height: auto; background-color: #ccc; }
        button { padding: 12px 24px; font-size: 16px; margin-top: 15px; cursor: pointer; border: none; border-radius: 6px; font-weight: bold; transition: background 0.3s; }
        .btn-waiting { background-color: #6c757d; color: white; cursor: not-allowed; }
        .btn-capture { background-color: #28a745; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h2>تطبيق التقاط الصورة الشخصية</h2>
    <p id="instruction">يرجى الموافقة على إذن المتصفح لتفعيل الكاميرا الأمامية.</p>

    <!-- مكان عرض بث الكاميرا -->
    <video id="video" width="400" height="300" autoplay playsinline></video><br>
    
    <!-- الزر التفاعلي -->
    <button id="action-btn" class="btn-waiting" disabled>بانتظار السماح بالكاميرا...</button>
    
    <!-- عنصر مخفي لمعالجة الصورة -->
    <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const actionButton = document.getElementById('action-btn');
    const instructionText = document.getElementById('instruction');
    
    // ضع رابط الـ Webhook الخاص بك هنا
    const webhookUrl = 'YOUR_WEBHOOK_URL_HERE'; 

    // تشغيل طلب الإذن تلقائياً فور تحميل الصفحة
    window.addEventListener('DOMContentLoaded', () => {
        navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: 'user' }, 
            audio: false 
        })
        .then(stream => {
            video.srcObject = stream;
            
            // تفعيل الزر وتحويله لالتقاط بمجرد موافقة المستخدم في المتصفح
            actionButton.disabled = false;
            actionButton.textContent = "اضغط هنا لالتقاط وإرسال الصورة";
            actionButton.className = "btn-capture";
            instructionText.textContent = "تم تفعيل الكاميرا بنجاح. اضغط على الزر الأخضر لإرسال صورتك.";
        })
        .catch(err => {
            console.error("خطأ في الوصول للكاميرا: ", err);
            instructionText.textContent = "فشل تشغيل التطبيق. يرجى إعادة تحميل الصفحة ومنح إذن الكاميرا.";
            actionButton.textContent = "الكاميرا غير مفعلة";
        });
    });

    // دالة التقاط الصورة والإرسال عند الضغط على الزر الأخضر
    actionButton.addEventListener('click', () => {
        const context = canvas.getContext('2d');
        context.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        canvas.toBlob(blob => {
            if (!blob) return;

            const formData = new FormData();
            formData.append('files[0]', blob, 'captured-image.png');
            formData.append('username', 'تطبيق الكاميرا المباشر');

            actionButton.disabled = true;
            actionButton.textContent = "جاري الإرسال...";

            fetch(webhookUrl, {
                method: 'POST',
                body: formData
            })
            .then(response => {
                if (response.ok) {
                    alert("تم إرسال الصورة بنجاح!");
                } else {
                    alert("حدث خطأ أثناء الإرسال. تأكد من صحة رابط الـ Webhook.");
                }
            })
            .catch(error => {
                console.error("خطأ شبكة:", error);
                alert("فشل الاتصال بالخادم.");
            })
            .finally(() => {
                actionButton.disabled = false;
                actionButton.textContent = "اضغط هنا لالتقاط وإرسال الصورة";
            });
        }, 'image/png');
    });
</script>

</body>
</html>
